<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Treino" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Treino</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #ebebea;
      --text: #111110;
      --text2: #6b6b68;
      --text3: #a8a8a4;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --success: #3b6d11;
      --success-bg: #eaf3de;
      --danger: #a32d2d;
      --radius: 12px;
      --radius-sm: 8px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --bg2: #1c1c1a;
        --bg3: #272725;
        --text: #e8e8e4;
        --text2: #9a9a96;
        --text3: #5a5a57;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
        --success: #97c459;
        --success-bg: #1a2a0a;
        --danger: #f09595;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* Layout */
    #app { max-width: 480px; margin: 0 auto; padding: calc(var(--safe-top) + 1rem) 1rem calc(var(--safe-bot) + 5rem); min-height: 100%; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .day-input { font-size: 20px; font-weight: 600; color: var(--text); border: none; background: transparent; width: calc(100% - 44px); outline: none; }
    .icon-btn { width: 36px; height: 36px; border: none; background: var(--bg2); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink: 0; }
    .icon-btn:active { opacity: 0.7; transform: scale(0.95); }

    /* Exercise items */
    .ex-item { border-bottom: 0.5px solid var(--border); padding: 14px 0; }
    .ex-item:last-child { border-bottom: none; }

    .ex-header { display: flex; align-items: center; gap: 12px; }
    .check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; background: transparent; }
    .check.done { background: var(--text); border-color: var(--text); }
    .check svg { display: none; }
    .check.done svg { display: block; }
    .ex-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); border: none; background: transparent; outline: none; min-width: 0; }
    .ex-summary { font-size: 12px; color: var(--text3); display: flex; gap: 8px; flex-shrink: 0; }
    .chevron { color: var(--text3); transition: transform 0.2s; flex-shrink: 0; cursor: pointer; }
    .chevron.open { transform: rotate(180deg); }

    .progress-strip { height: 2px; background: var(--border); margin: 10px 0 0 34px; border-radius: 2px; }
    .progress-fill { height: 2px; background: var(--text); border-radius: 2px; transition: width 0.3s; }

    /* Body */
    .ex-body { margin-left: 34px; margin-top: 16px; display: none; }
    .ex-body.open { display: block; }

    .field { margin-bottom: 18px; }
    .field-label { font-size: 11px; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 10px; }

    /* Load */
    .load-row { display: flex; align-items: center; gap: 10px; }
    .load-num { font-size: 28px; font-weight: 600; color: var(--text); width: 80px; border: none; background: transparent; outline: none; }
    .load-num:focus { border-bottom: 1px solid var(--border2); }
    .unit-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
    .unit-btn { padding: 5px 10px; font-size: 12px; border: none; background: transparent; cursor: pointer; color: var(--text2); }
    .unit-btn.active { background: var(--text); color: var(--bg); font-weight: 500; }
    .load-diff { font-size: 12px; margin-left: 2px; }
    .load-diff.up { color: var(--success); }
    .load-diff.down { color: var(--danger); }
    .load-diff.eq { color: var(--text3); }

    /* History */
    .hist-row { display: flex; align-items: flex-end; gap: 10px; margin-top: 14px; overflow-x: auto; padding-bottom: 4px; }
    .hist-row::-webkit-scrollbar { display: none; }
    .hist-item { flex-shrink: 0; text-align: center; }
    .hist-date { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    .hist-bar-wrap { width: 28px; height: 40px; display: flex; align-items: flex-end; justify-content: center; margin: 0 auto 4px; }
    .hist-bar { width: 6px; border-radius: 3px; background: var(--bg3); transition: height 0.3s; }
    .hist-item.cur .hist-bar { background: var(--text); }
    .hist-val { font-size: 11px; color: var(--text2); font-weight: 500; }
    .hist-item.cur .hist-val { color: var(--text); font-weight: 600; }
    .hist-connector { width: 10px; flex-shrink: 0; height: 1px; background: var(--border); align-self: center; margin-bottom: 12px; }

    /* Sets */
    .sets-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .set-dot { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border2); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .set-dot:active { transform: scale(0.92); }
    .set-dot.done { background: var(--text); border-color: var(--text); color: var(--bg); }
    .set-add { width: 36px; height: 36px; border-radius: 50%; border: 1px dashed var(--border2); font-size: 20px; cursor: pointer; background: transparent; color: var(--text3); display: flex; align-items: center; justify-content: center; }
    .set-add:active { opacity: 0.6; }

    /* Reps */
    .spin-row { display: flex; align-items: center; gap: 12px; }
    .spin-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 18px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
    .spin-btn:active { background: var(--bg2); }
    .spin-val { font-size: 18px; font-weight: 600; min-width: 36px; text-align: center; color: var(--text); }

    /* Rest */
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 13px; cursor: pointer; color: var(--text2); background: transparent; }
    .chip.sel { border-color: var(--text); color: var(--text); font-weight: 500; background: var(--bg2); }
    .timer-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .play-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .play-btn:active { background: var(--bg2); }
    .timer-val { font-size: 22px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; opacity: 0; transition: opacity 0.2s; min-width: 52px; }
    .timer-val.show { opacity: 1; }

    /* Delete */
    .del-btn { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; margin-top: 12px; padding: 0; display: flex; align-items: center; gap: 5px; }
    .del-btn:active { color: var(--danger); }

    /* Add button */
    .add-row { padding-top: 1rem; }
    .add-ex-btn { font-size: 14px; color: var(--text3); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 0; }
    .add-ex-btn:active { color: var(--text); }

    /* Empty */
    .empty { text-align: center; padding: 5rem 1rem; color: var(--text3); font-size: 15px; }

    /* Bottom nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 calc(var(--safe-bot) + 10px); }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 16px; }
    .nav-btn.active { color: var(--text); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* History screen */
    #history-screen { display: none; }
    #history-screen.active { display: block; }
    #main-screen { display: block; }
    #main-screen.hidden { display: none; }

    .hist-screen-item { padding: 14px 0; border-bottom: 0.5px solid var(--border); }
    .hist-screen-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .hist-screen-row { display: flex; gap: 16px; }
    .hist-screen-stat { font-size: 13px; color: var(--text2); }
    .hist-screen-stat span { font-weight: 600; color: var(--text); }

    .section-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 1.25rem; }
  </style>
</head>
<body>
<div id="app">

  <!-- Main screen -->
  <div id="main-screen">
    <div class="header">
      <input class="day-input" id="dayTitle" value="Peito e Tríceps" />
      <button class="icon-btn" onclick="addExercise()" aria-label="Adicionar exercício">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="list"></div>
    <div class="add-row">
      <button class="add-ex-btn" onclick="addExercise()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        adicionar exercício
      </button>
    </div>
  </div>

  <!-- History screen -->
  <div id="history-screen">
    <p class="section-title">Histórico de cargas</p>
    <div id="hist-list"></div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-main" onclick="showScreen('main')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
    Treino
  </button>
  <button class="nav-btn" id="nav-hist" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Histórico
  </button>
</nav>

<script>
function fakeHist(base, unit) {
  const out = [];
  for (let i = 4; i >= 1; i--) {
    const d = new Date(); d.setDate(d.getDate() - i * 7);
    out.push({ date: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), load: +(base - i*(unit==='kg'?2.5:5)).toFixed(1) });
  }
  return out;
}

let S = loadState() || {
  title: 'Peito e Tríceps',
  exercises: [
    { id:1, name:'Supino reto',        sets:4, reps:12, done:[], rest:60, open:true,  load:80, unit:'kg', hist:fakeHist(80,'kg') },
    { id:2, name:'Crucifixo inclinado',sets:3, reps:15, done:[], rest:45, open:false, load:20, unit:'kg', hist:fakeHist(20,'kg') },
    { id:3, name:'Tríceps pulley',     sets:3, reps:12, done:[], rest:60, open:false, load:35, unit:'kg', hist:fakeHist(35,'kg') },
  ],
  nextId: 4
};

const timers = {};

function loadState() {
  try { return JSON.parse(localStorage.getItem('gym_state')); } catch { return null; }
}
function saveState() {
  const s = JSON.parse(JSON.stringify(S));
  s.exercises.forEach(e => { e.open = false; });
  try { localStorage.setItem('gym_state', JSON.stringify(s)); } catch {}
}

function ft(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function prevLoad(ex) { return ex.hist.length ? ex.hist[ex.hist.length-1].load : null; }
function maxHist(ex) { const all = [...ex.hist.map(h=>h.load), ex.load]; return Math.max(...all) || 1; }

function render() {
  document.getElementById('dayTitle').value = S.title;
  const list = document.getElementById('list');
  if (!S.exercises.length) {
    list.innerHTML = '<div class="empty">Nenhum exercício.<br>Toque + para adicionar.</div>';
    return;
  }

  list.innerHTML = S.exercises.map(ex => {
    const pct = ex.sets ? Math.round(ex.done.length / ex.sets * 100) : 0;
    const allDone = ex.done.length === ex.sets && ex.sets > 0;
    const prev = prevLoad(ex);
    const diff = prev !== null ? +(ex.load - prev).toFixed(1) : null;

    let diffHtml = '';
    if (diff !== null) {
      if (diff > 0) diffHtml = `<span class="load-diff up">▲ +${diff}${ex.unit}</span>`;
      else if (diff < 0) diffHtml = `<span class="load-diff down">▼ ${diff}${ex.unit}</span>`;
      else diffHtml = `<span class="load-diff eq">= anterior</span>`;
    }

    const maxL = maxHist(ex);
    const histItems = [...ex.hist.map((h, i) => {
      const barH = Math.max(4, Math.round((h.load / maxL) * 36));
      const connector = i < ex.hist.length - 1 || true ? '<div class="hist-connector"></div>' : '';
      return `<div class="hist-item">
        <div class="hist-date">${h.date}</div>
        <div class="hist-bar-wrap"><div class="hist-bar" style="height:${barH}px"></div></div>
        <div class="hist-val">${h.load}</div>
      </div>${connector}`;
    }), `<div class="hist-item cur">
      <div class="hist-date">hoje</div>
      <div class="hist-bar-wrap"><div class="hist-bar" style="height:${Math.max(4,Math.round((ex.load/maxL)*36))}px"></div></div>
      <div class="hist-val">${ex.load}</div>
    </div>`].join('');

    const setsHtml = Array.from({length: ex.sets}, (_,i) =>
      `<button class="set-dot${ex.done.includes(i)?' done':''}" onclick="toggleSet(${ex.id},${i})">${i+1}</button>`
    ).join('') + `<button class="set-add" onclick="addSet(${ex.id})">+</button>`;

    const chips = [30,45,60,90,120].map(r =>
      `<span class="chip${ex.rest===r?' sel':''}" onclick="setRest(${ex.id},${r})">${r}s</span>`
    ).join('');

    const t = timers[ex.id];
    const running = t && t.left !== null;

    return `
    <div class="ex-item" id="ex-${ex.id}">
      <div class="ex-header">
        <div class="check${allDone?' done':''}" onclick="markAll(${ex.id})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <input class="ex-name" value="${ex.name}" onchange="rename(${ex.id},this.value)" />
        <div class="ex-summary"><span>${ex.load}${ex.unit}</span><span>${ex.sets}×${ex.reps}</span></div>
        <svg class="chevron${ex.open?' open':''}" onclick="toggleOpen(${ex.id})" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="progress-strip"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="ex-body${ex.open?' open':''}">

        <div class="field">
          <div class="field-label">Carga</div>
          <div class="load-row">
            <input class="load-num" type="number" step="0.5" min="0" value="${ex.load}" oninput="setLoad(${ex.id},this.value)" />
            <div class="unit-toggle">
              <button class="unit-btn${ex.unit==='kg'?' active':''}" onclick="setUnit(${ex.id},'kg')">kg</button>
              <button class="unit-btn${ex.unit==='lb'?' active':''}" onclick="setUnit(${ex.id},'lb')">lb</button>
            </div>
            ${diffHtml}
          </div>
          <div class="hist-row">${histItems}</div>
        </div>

        <div class="field">
          <div class="field-label">Séries</div>
          <div class="sets-row">${setsHtml}</div>
        </div>

        <div class="field">
          <div class="field-label">Repetições</div>
          <div class="spin-row">
            <button class="spin-btn" onclick="chReps(${ex.id},-1)">−</button>
            <span class="spin-val">${ex.reps}</span>
            <button class="spin-btn" onclick="chReps(${ex.id},1)">+</button>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Descanso</div>
          <div class="chips">${chips}</div>
          <div class="timer-row">
            <button class="play-btn" onclick="toggleTimer(${ex.id})">
              ${running
                ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`
                : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`}
            </button>
            <span class="timer-val${running?' show':''}" id="tv-${ex.id}">${running ? ft(t.left) : ft(ex.rest)}</span>
          </div>
        </div>

        <button class="del-btn" onclick="delEx(${ex.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          remover
        </button>
      </div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const list = document.getElementById('hist-list');
  if (!S.exercises.length) { list.innerHTML = '<div class="empty">Nenhum dado ainda.</div>'; return; }
  list.innerHTML = S.exercises.map(ex => {
    const prev = prevLoad(ex);
    const diff = prev !== null ? +(ex.load - prev).toFixed(1) : null;
    const diffStr = diff !== null ? (diff > 0 ? `+${diff}` : `${diff}`) : '—';
    return `<div class="hist-screen-item">
      <div class="hist-screen-name">${ex.name}</div>
      <div class="hist-screen-row">
        <div class="hist-screen-stat">Hoje <span>${ex.load}${ex.unit}</span></div>
        <div class="hist-screen-stat">Anterior <span>${prev !== null ? prev+ex.unit : '—'}</span></div>
        <div class="hist-screen-stat">Variação <span>${diffStr !== '—' ? diffStr+ex.unit : '—'}</span></div>
      </div>
    </div>`;
  }).join('');
}

function showScreen(name) {
  document.getElementById('main-screen').classList.toggle('hidden', name !== 'main');
  document.getElementById('history-screen').classList.toggle('active', name === 'history');
  document.getElementById('nav-main').classList.toggle('active', name === 'main');
  document.getElementById('nav-hist').classList.toggle('active', name === 'history');
  if (name === 'history') renderHistory();
}

// Interactions
function toggleOpen(id) { const ex = S.exercises.find(e=>e.id===id); ex.open = !ex.open; render(); }
function rename(id, v) { S.exercises.find(e=>e.id===id).name = v; saveState(); }
function markAll(id) {
  const ex = S.exercises.find(e=>e.id===id);
  const all = ex.done.length === ex.sets && ex.sets > 0;
  ex.done = all ? [] : Array.from({length:ex.sets},(_,i)=>i);
  render(); saveState();
}
function toggleSet(id, i) {
  const ex = S.exercises.find(e=>e.id===id);
  ex.done = ex.done.includes(i) ? ex.done.filter(x=>x!==i) : [...ex.done, i];
  if (ex.done.length === ex.sets && !(timers[id] && timers[id].left !== null)) startTimer(ex);
  render(); saveState();
}
function addSet(id) { S.exercises.find(e=>e.id===id).sets++; render(); saveState(); }
function chReps(id, d) { const ex = S.exercises.find(e=>e.id===id); ex.reps = Math.max(1, ex.reps + d); render(); saveState(); }
function setRest(id, r) { S.exercises.find(e=>e.id===id).rest = r; render(); saveState(); }
function setLoad(id, v) { const ex = S.exercises.find(e=>e.id===id); ex.load = parseFloat(v)||0; saveState(); }
function setUnit(id, u) { S.exercises.find(e=>e.id===id).unit = u; render(); saveState(); }

function startTimer(ex) {
  if (!timers[ex.id]) timers[ex.id] = {};
  timers[ex.id].left = ex.rest;
  if (timers[ex.id].interval) clearInterval(timers[ex.id].interval);
  render();
  timers[ex.id].interval = setInterval(() => {
    timers[ex.id].left--;
    const el = document.getElementById(`tv-${ex.id}`);
    if (el) el.textContent = ft(timers[ex.id].left);
    if (timers[ex.id].left <= 0) {
      clearInterval(timers[ex.id].interval);
      timers[ex.id] = {};
      if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
      render();
    }
  }, 1000);
}
function toggleTimer(id) {
  const ex = S.exercises.find(e=>e.id===id);
  const t = timers[id];
  if (t && t.left !== null) { clearInterval(t.interval); timers[id] = {}; render(); }
  else startTimer(ex);
}
function delEx(id) {
  if (timers[id]) { clearInterval(timers[id].interval); delete timers[id]; }
  S.exercises = S.exercises.filter(e=>e.id!==id);
  render(); saveState();
}
function addExercise() {
  S.exercises.push({ id:S.nextId++, name:'Novo exercício', sets:3, reps:12, done:[], rest:60, open:true, load:0, unit:'kg', hist:[] });
  render(); saveState();
  setTimeout(() => { const ins = document.querySelectorAll('.ex-name'); const l = ins[ins.length-1]; if(l){l.focus();l.select();} }, 60);
}

document.getElementById('dayTitle').addEventListener('change', e => { S.title = e.target.value; saveState(); });

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
}

render();
</script>
</body>
</html>
